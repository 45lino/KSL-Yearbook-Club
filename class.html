<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class of 2025/26 - KSL Yearbook Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background: #fafbfc;
        }

        nav {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            padding: 1.2rem 4rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 20px rgba(0,0,0,0.05);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 3rem;
        }

        nav a {
            color: #2d3748;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            transition: color 0.3s ease;
            text-transform: uppercase;
        }

        nav a:hover {
            color: #667eea;
        }

        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 5rem 2rem 4rem;
        }

        .page-header h1 {
            font-family: 'EB Garamond', serif;
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .page-header p {
            font-size: 1.3rem;
            opacity: 0.95;
        }

        .class-container {
            padding: 5rem 2rem;
            max-width: 1300px;
            margin: 0 auto;
        }

        .class-group {
            margin-bottom: 2rem;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .class-header {
            width: 100%;
            padding: 2rem 2.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .class-header:hover {
            background: linear-gradient(135deg, #5568d3 0%, #653a8f 100%);
        }

        .class-title {
            font-family: 'EB Garamond', serif;
            font-size: 2rem;
            font-weight: 700;
            color: white;
            letter-spacing: 1px;
        }

        .arrow {
            font-size: 1.5rem;
            color: white;
            transition: transform 0.3s ease;
        }

        .arrow.rotate {
            transform: rotate(180deg);
        }

        .class-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
            padding: 0;
        }

        .class-content.active {
            max-height: 10000px;
            padding: 3rem 2.5rem;
        }

        .students-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2rem;
        }

        .student-card {
            background: #fafbfc;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
        }

        .student-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.15);
        }

        .student-photo {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background: linear-gradient(135deg, #e0e7ff 0%, #f3e8ff 100%);
        }

        .student-name {
            padding: 1.2rem;
            text-align: center;
            font-weight: 600;
            color: #2d3748;
            font-size: 0.95rem;
            min-height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        footer {
            background: #2d3748;
            color: #e2e8f0;
            text-align: center;
            padding: 2.5rem 2rem;
        }

        @media (max-width: 1024px) {
            .students-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            nav {
                padding: 1rem 1.5rem;
            }

            nav ul {
                gap: 1.5rem;
                flex-wrap: wrap;
            }

            .page-header h1 {
                font-size: 2.5rem;
            }

            .students-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1.5rem;
            }

            .class-title {
                font-size: 1.5rem;
            }

            .student-photo {
                height: 200px;
            }
        }
    </style>
</head>

    <script>
        function toggleClass(classId) {
            const content = document.getElementById(classId);
            const arrowLetter = classId.slice(-1).toUpperCase();
            const arrow = document.getElementById('arrow' + arrowLetter);
            
            content.classList.toggle('active');
            arrow.classList.toggle('rotate');
        }
